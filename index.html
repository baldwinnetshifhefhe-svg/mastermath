<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>MasterMaths — DBE Grade 12 Mathematics</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="MasterMaths — Grade 12 DBE Mathematics past papers, strategies, and AI explanations.">
  <meta name="theme-color" content="#2d7a3a">
  <script>
    // Apply saved theme before the JS module loads to avoid a palette flash.
    try {
      var t = localStorage.getItem('theme_mode') || 'light';
      if (!['light','dark','heritage'].includes(t)) t = 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
</head>
<body>
  <div id="app">
    <nav id="appSidebar" class="mm-sidebar"></nav>
    <div id="appSidebarBackdrop" class="mm-sidebar-backdrop"></div>
    <header id="appHeader" class="mm-header"></header>
    <main id="appContent" class="mm-content"></main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
